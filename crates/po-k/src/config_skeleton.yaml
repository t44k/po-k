# po-k config — generated by `po-k init`. Edit `projects:` below to taste, then
# run `po-k serve` (or `po-k serve --install-systemd --user`).
#
# po-k drives Claude Code over zellij and is controlled by Xpo-k over a
# WebSocket. It runs NO orchestrator-facing HTTP server — only the localhost
# hook listener below, which receives CC's hook + permission callbacks.

auth:
  bearer_token_file: ~/.config/po-k/auth.token

# Connection to the central Xpo-k router. Uncomment + point at your Xpo-k to
# make this po-k reachable by an orchestrator.
# xpok:
#   url: ws://xpo-k.host:8080/ws
#   token: "<shared secret / xpo-k bearer token>"
#   reconnect_interval: 5s

# Localhost-only listener for CC hook + permission callbacks (no auth).
hooks:
  bind: 127.0.0.1:7070

# Defaults applied to every project unless that project overrides.
cc:
  model: sonnet
  effort: medium
  permission_mode: dangerouslySkipPermissions
  permission_timeout: 60s            # how long po-k mcp blocks waiting for orchestrator
  disable_slash_commands: true

zellij:
  session_prefix: po-k-              # session name = <prefix><project>; override per project below

projects:
  - name: po-k
    cwd: /workspace
    # optional overrides:
    # model: claude-opus-4-7
    # effort: high
    # add_dirs: [/workspace]
    # zellij_session: custom-name
