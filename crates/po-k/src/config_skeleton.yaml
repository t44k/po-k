# po-k config — generated by `po-k init`.
# Each field has a sensible default; edit freely, then run `po-k config` to print
# the effective merged config (main + per-repo overlays).

repo:
  # Required for distillation + memory writes. Use a private repo you can push to.
  url: ""                                # e.g. git@github.com:you/po-k-memory.git
  path: ~/.cache/po-k/repo
  branch: main
  push: true
  pull_interval: 5m
  push_debounce: 30s

llm:
  # `claude-cli` is zero-config (uses your existing Claude Code auth via `claude -p`).
  # Switch to `anthropic` or `openai` if you'd rather hit the API directly.
  backend: claude-cli
  # model: claude-opus-4-7

# Topics the distiller maintains living markdown digests for. Add / remove freely;
# each topic becomes `memory/<id>.md` in the repo.
topics:
  - id: auth-pattern
    question: "What auth pattern does this team use?"
  - id: testing-conventions
    question: "What testing conventions has this team adopted?"
  - id: deploy-prod
    question: "How do we deploy to production?"
  - id: general-dev
    question: "What general development practices does this team follow?"

service:
  socket: ~/.config/po-k/service.sock
  state_db: ~/.config/po-k/state.db

gateway:
  # zellij_session: work
  # Each entry is a directory the gateway is allowed to drive. The gateway only
  # exposes projects whose cwd matches one of these AND has a live `claude` pane.
  projects:
    # - slug: po-k
    #   cwd: /workspace
    # - slug: scratch
    #   cwd_glob: ~/scratch/*
